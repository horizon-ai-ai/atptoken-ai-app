name: Deploy app.atptoken.ai

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal source
        uses: actions/checkout@v4
        with:
          repository: horizon-ai-ai/portal-fe
          ref: dev
          path: portal-fe
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-fe/package-lock.json

      - name: Install dependencies
        working-directory: portal-fe
        run: npm ci

      - name: Build static site
        working-directory: portal-fe
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://dev.atptoken.ai/api

      - name: Prepare Pages files
        working-directory: portal-fe
        run: |
          touch out/.nojekyll
          echo app.atptoken.ai > out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portal-fe/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
